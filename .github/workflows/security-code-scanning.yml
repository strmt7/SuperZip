name: security

on:
  push:
  pull_request:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read # allow workflow jobs to check out and scan repository contents

concurrency:
  group: security-code-scanning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql-cpp:
    name: CodeQL C++
    runs-on: windows-2022
    # CodeQL needs action metadata for analysis, repository contents to build,
    # and security-events write permission to upload SARIF.
    permissions:
      actions: read # allow CodeQL to read workflow/action metadata
      contents: read # allow checkout and C++ database construction
      security-events: write # allow CodeQL SARIF upload to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: c-cpp
          build-mode: manual
          dependency-caching: true
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-extended,security-and-quality
      - name: Build C++ database
        shell: pwsh
        run: tools/build.ps1 -Configuration Release -PackageVersion 0.1.0-security
      - name: Analyze C++
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:c-cpp

  codeql-actions:
    name: CodeQL GitHub Actions
    runs-on: ubuntu-latest
    # CodeQL needs action metadata for analysis, repository contents to scan,
    # and security-events write permission to upload SARIF.
    permissions:
      actions: read # allow CodeQL to read workflow/action metadata
      contents: read # allow checkout and Actions workflow analysis
      security-events: write # allow CodeQL SARIF upload to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: actions
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-extended,security-and-quality
      - name: Analyze GitHub Actions
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:actions

  workflow-security:
    name: Workflow lint and injection scan
    runs-on: ubuntu-latest
    # zizmor uses action metadata and uploads workflow-audit SARIF.
    permissions:
      actions: read # allow actionlint/zizmor to inspect action metadata
      contents: read # allow checkout and workflow file analysis
      security-events: write # allow zizmor SARIF upload to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
          cache: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Audit scan scope
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Workflow security scan scope"
          find .github/workflows -type f \( -name '*.yml' -o -name '*.yaml' \) | sort
          echo "::endgroup::"
      - name: Run actionlint
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$HOME/go/bin/actionlint" -color
      - name: Run zizmor
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --require-hashes -r .github/requirements/requirements-zizmor-linux.txt
          zizmor --format sarif --persona auditor .github/workflows > zizmor-results.sarif
      - name: Upload zizmor SARIF
        if: always() && hashFiles('zizmor-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: zizmor-results.sarif
          category: zizmor

  trivy-filesystem:
    name: Trivy filesystem security scan
    runs-on: ubuntu-latest
    # Trivy reads repository contents and uploads filesystem-scan SARIF.
    permissions:
      actions: read # allow scanner action metadata access
      contents: read # allow checkout and filesystem analysis
      security-events: write # allow Trivy SARIF upload to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Audit scan scope
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Trivy scan scope"
          find . -maxdepth 6 \( -name 'CMakeLists.txt' -o -name '*.cmake' -o -name '*.json' -o -name '*.yml' -o -name '*.yaml' -o -name '*.ps1' -o -name '*.cpp' -o -name '*.hpp' -o -name '*.c' -o -name '*.h' \) | sort
          echo "::endgroup::"
      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          scanners: vuln,misconfig,secret,license
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          exit-code: "1"
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    # Semgrep reads repository contents and uploads SAST SARIF.
    permissions:
      actions: read # allow scanner action metadata access
      contents: read # allow checkout and SAST analysis
      security-events: write # allow Semgrep SARIF upload to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Audit scan scope
        run: |
          echo "::group::Semgrep scan scope"
          find . -type f \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.c' -o -name '*.h' -o -name '*.ps1' -o -name '*.py' -o -name '*.yml' -o -name '*.yaml' -o -name '*.md' -o -name 'CMakeLists.txt' \) | sort
          echo "::endgroup::"
      - name: Run Semgrep
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/src:ro" \
            -w /src \
            semgrep/semgrep:1.163.0@sha256:7cad2bc2d1e44f87f0bf4be6d1fa23aa90fb72015bebc89fb91385d813987a03 \
            semgrep scan --sarif --metrics=off --no-git-ignore --max-target-bytes 100000000 --config p/default --config p/github-actions . \
            > semgrep-results.sarif
      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  devskim:
    name: DevSkim security lint
    runs-on: ubuntu-latest
    # DevSkim reads repository contents and uploads security-lint SARIF.
    permissions:
      actions: read # allow scanner action metadata access
      contents: read # allow checkout and security lint analysis
      security-events: write # allow DevSkim SARIF upload to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Audit scan scope
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::DevSkim scan scope"
          find . -type f \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.c' -o -name '*.h' -o -name '*.ps1' -o -name '*.py' -o -name '*.yml' -o -name '*.yaml' -o -name '*.md' -o -name 'CMakeLists.txt' \) | sort
          echo "::endgroup::"
      - name: Run DevSkim
        uses: microsoft/DevSkim-Action@4b5047945a44163b94642a1cecc0d93a3f428cc6 # v1.0.16
        with:
          directory-to-scan: .
          ignore-globs: "**/.git/**"
      - name: Upload DevSkim SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: devskim-results.sarif
          category: devskim

  osv-scanner:
    name: OSV dependency vulnerability scan
    # OSV scans dependency manifests and writes dependency SARIF.
    permissions:
      actions: read # allow reusable scanner workflow metadata access
      contents: read # allow dependency manifest discovery
      security-events: write # allow OSV SARIF upload to code scanning
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --recursive
        ./

  grype-filesystem:
    name: Grype filesystem vulnerability scan
    runs-on: ubuntu-latest
    # Grype reads the repository filesystem and uploads vulnerability SARIF.
    permissions:
      contents: read # allow checkout and filesystem dependency analysis
      security-events: write # allow Grype SARIF upload to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: .
          fail-build: true
          severity-cutoff: low
          output-format: sarif
          output-file: grype-results.sarif
      - name: Upload Grype SARIF
        if: always() && hashFiles('grype-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: grype-results.sarif
          category: grype-fs

  secret-history:
    name: Secret history scan
    runs-on: ubuntu-latest
    # Secret scanners need full git history and repository contents.
    permissions:
      contents: read # allow full-history checkout and secret scanning
    steps:
      - name: Checkout full history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Prepare secret scan reports
        shell: bash
        run: mkdir -p reports/secrets
      - name: Run Gitleaks against git history
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:b109bc5f8f76a38196a3e413704fc5b9e3c32360bce4e4b603bd6f45b3721dbb \
            git . --redact --verbose --exit-code 1 --report-format json --report-path reports/secrets/gitleaks-git.json
      - name: Run Gitleaks against working tree
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:b109bc5f8f76a38196a3e413704fc5b9e3c32360bce4e4b603bd6f45b3721dbb \
            dir . --redact --verbose --exit-code 1 --report-format json --report-path reports/secrets/gitleaks-dir.json
      - name: Run TruffleHog against git history
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/repo:ro" \
            trufflesecurity/trufflehog:3.95.5@sha256:ce57a0504050b247c378e66ff5fa08f7ea97ee375d5a5e30a4ae0281566a987f \
            git file:///repo --results=verified,unknown --fail --json > reports/secrets/trufflehog-git.jsonl
      - name: Upload secret scan reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: secret-history-reports
          path: reports/secrets
          if-no-files-found: error

  sbom:
    name: SBOM generation
    runs-on: ubuntu-latest
    # SBOM generation only needs repository read access.
    permissions:
      contents: read # allow checkout and SBOM source discovery
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: superzip-sbom.spdx.json
          upload-artifact: true

  scorecard:
    name: OSSF Scorecard supply-chain security
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Scorecard reads repository metadata, uses OIDC for result signing, and
    # uploads SARIF to code scanning.
    permissions:
      actions: read # allow Scorecard workflow policy checks
      contents: read # allow repository metadata/content checks
      id-token: write # allow Scorecard result signing
      security-events: write # allow Scorecard SARIF upload to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload Scorecard SARIF
        if: always() && hashFiles('scorecard-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Dependency Review only needs repository contents and pull-request metadata.
    permissions:
      contents: read # allow dependency manifest diff inspection
      pull-requests: read # allow dependency review on pull requests
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          warn-only: false
