name: security

on:
  push:
  pull_request:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-code-scanning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql-cpp:
    name: CodeQL C++
    runs-on: windows-2022
    # CodeQL needs action metadata for analysis, repository contents to build,
    # and security-events write permission to upload SARIF.
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: c-cpp
          build-mode: manual
          dependency-caching: true
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-extended,security-and-quality
      - name: Build C++ database
        shell: pwsh
        run: tools/build.ps1 -Configuration Release -PackageVersion 0.1.0-security
      - name: Analyze C++
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:c-cpp

  codeql-actions:
    name: CodeQL GitHub Actions
    runs-on: ubuntu-latest
    # CodeQL needs action metadata for analysis, repository contents to scan,
    # and security-events write permission to upload SARIF.
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: actions
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-extended,security-and-quality
      - name: Analyze GitHub Actions
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:actions

  workflow-security:
    name: Workflow lint and injection scan
    runs-on: ubuntu-latest
    # zizmor uses action metadata and uploads workflow-audit SARIF.
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
          cache: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Audit scan scope
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Workflow security scan scope"
          find .github/workflows -type f \( -name '*.yml' -o -name '*.yaml' \) | sort
          echo "::endgroup::"
      - name: Run actionlint
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$HOME/go/bin/actionlint" -color
      - name: Run zizmor
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --require-hashes -r .github/requirements/requirements-zizmor-linux.txt
          zizmor --format sarif --persona auditor .github/workflows > zizmor-results.sarif
      - name: Upload zizmor SARIF
        if: always() && hashFiles('zizmor-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: zizmor-results.sarif
          category: zizmor

  trivy-filesystem:
    name: Trivy filesystem security scan
    runs-on: ubuntu-latest
    # Trivy reads repository contents and uploads filesystem-scan SARIF.
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Audit scan scope
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Trivy scan scope"
          find . -maxdepth 5 \( -name 'CMakeLists.txt' -o -name '*.cmake' -o -name '*.json' -o -name '*.yml' -o -name '*.yaml' -o -name '*.ps1' \) \
            -not -path './.git/*' -not -path './third_party/*' -not -path './build/*' -not -path './out/*' | sort
          echo "::endgroup::"
      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          scanners: vuln,misconfig,secret,license
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          skip-dirs: third_party,build,out,reports
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    # Semgrep reads repository contents and uploads SAST SARIF.
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Audit scan scope
        run: |
          echo "::group::Semgrep scan scope"
          find src tests tools .github -type f \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.c' -o -name '*.h' -o -name '*.ps1' -o -name '*.yml' -o -name '*.yaml' \) \
            -not -path './third_party/*' | sort
          echo "::endgroup::"
      - name: Run Semgrep
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/src:ro" \
            -w /src \
            semgrep/semgrep:1.163.0@sha256:7cad2bc2d1e44f87f0bf4be6d1fa23aa90fb72015bebc89fb91385d813987a03 \
            semgrep scan --sarif --metrics=off --config p/default --config p/github-actions --exclude third_party --exclude build --exclude out . \
            > semgrep-results.sarif
      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  devskim:
    name: DevSkim security lint
    runs-on: ubuntu-latest
    # DevSkim reads repository contents and uploads security-lint SARIF.
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Audit scan scope
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::DevSkim scan scope"
          find src tests tools .github -type f \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.c' -o -name '*.h' -o -name '*.ps1' -o -name '*.yml' -o -name '*.yaml' -o -name '*.md' \) \
            -not -path './third_party/*' | sort
          echo "::endgroup::"
      - name: Run DevSkim
        uses: microsoft/DevSkim-Action@4b5047945a44163b94642a1cecc0d93a3f428cc6 # v1.0.16
        with:
          directory-to-scan: .
          ignore-globs: "**/.git/**,**/third_party/**,**/build/**,**/out/**,**/reports/**"
      - name: Upload DevSkim SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: devskim-results.sarif
          category: devskim

  osv-scanner:
    name: OSV dependency vulnerability scan
    # OSV scans dependency manifests and writes dependency SARIF.
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./

  sbom:
    name: SBOM generation
    runs-on: ubuntu-latest
    # SBOM generation only needs repository read access.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: superzip-sbom.spdx.json
          upload-artifact: true

  scorecard:
    name: OSSF Scorecard supply-chain security
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Scorecard reads repository metadata, uses OIDC for result signing, and
    # uploads SARIF to code scanning.
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        continue-on-error: true
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload Scorecard SARIF
        if: always() && hashFiles('scorecard-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Dependency Review only needs repository contents and pull-request metadata.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          warn-only: false
