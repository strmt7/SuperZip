name: lint

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  language-linters:
    name: Language linters
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install Python linters
        shell: pwsh
        run: |
          python -m pip install `
            --disable-pip-version-check `
            --require-hashes `
            --only-binary=:all: `
            -r .github/requirements/requirements-lint-windows.txt
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.24.0 -Scope CurrentUser -Force
      - name: Run linters
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            tools/lint.ps1 -CppMode Changed -BaseRef HEAD~1 -HeadRef HEAD
          } elseif ("${{ github.event_name }}" -eq "pull_request") {
            tools/lint.ps1 -CppMode Changed -BaseRef "origin/${{ github.base_ref }}" -HeadRef "${{ github.sha }}"
          } else {
            tools/lint.ps1 -CppMode Changed -BaseRef "${{ github.event.before }}" -HeadRef "${{ github.sha }}"
          }
