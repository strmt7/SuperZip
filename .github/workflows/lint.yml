name: lint

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  language-linters:
    name: Language linters
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install Python linters
        shell: pwsh
        run: |
          python -m pip install `
            --disable-pip-version-check `
            --require-hashes `
            --only-binary=:all: `
            -r .github/requirements/requirements-lint-windows.txt
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $moduleName = "PSScriptAnalyzer"
          $version = "1.24.0"
          $expectedSha256 = "E86C97D44BB1BC8A1DE35E753B85EA1D938F6F9F881639A181507E079BCA4556"
          $package = Join-Path $env:RUNNER_TEMP "$moduleName.$version.nupkg"
          $modulePath = Join-Path ([Environment]::GetFolderPath("MyDocuments")) "PowerShell/Modules/$moduleName/$version"
          Invoke-WebRequest `
            -Uri "https://www.powershellgallery.com/api/v2/package/$moduleName/$version" `
            -OutFile $package
          $actualSha256 = (Get-FileHash -LiteralPath $package -Algorithm SHA256).Hash
          if ($actualSha256 -ne $expectedSha256) {
            throw "$moduleName $version package hash mismatch."
          }
          if (Test-Path -LiteralPath $modulePath) {
            Remove-Item -LiteralPath $modulePath -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $modulePath | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory($package, $modulePath)
          Import-Module $moduleName -RequiredVersion $version -Force
      - name: Run linters
        shell: pwsh
        env:
          SUPERZIP_EVENT_NAME: ${{ github.event_name }}
          SUPERZIP_BASE_REF: ${{ github.base_ref }}
          SUPERZIP_HEAD_SHA: ${{ github.sha }}
          SUPERZIP_BEFORE_SHA: ${{ github.event.before }}
        run: |
          $ErrorActionPreference = "Stop"
          $eventName = $env:SUPERZIP_EVENT_NAME
          if ($eventName -eq "workflow_dispatch") {
            tools/lint.ps1 -CppMode Changed -BaseRef HEAD~1 -HeadRef HEAD
          } elseif ($eventName -eq "pull_request") {
            $baseRef = "origin/$($env:SUPERZIP_BASE_REF)"
            tools/lint.ps1 -CppMode Changed -BaseRef "$baseRef" -HeadRef "$env:SUPERZIP_HEAD_SHA"
          } else {
            tools/lint.ps1 -CppMode Changed -BaseRef "$env:SUPERZIP_BEFORE_SHA" -HeadRef "$env:SUPERZIP_HEAD_SHA"
          }
