name: scorecard

on:
  push:
    branches:
      - main
  schedule:
    - cron: "41 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read # allow repository metadata/content checks by default

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    name: OSSF Scorecard supply-chain security
    runs-on: ubuntu-latest
    # Scorecard is a repository-level check. The action rejects non-default
    # branch push refs, so this workflow is intentionally default-branch only.
    # Keep this job limited to action steps; Scorecard verifies that shape before
    # publishing signed results.
    permissions:
      actions: read # allow Scorecard workflow policy checks
      contents: read # allow repository metadata/content checks
      id-token: write # allow Scorecard result signing
      security-events: write # allow Scorecard SARIF upload to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload Scorecard SARIF
        if: always() && hashFiles('scorecard-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
