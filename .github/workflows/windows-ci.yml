name: windows-ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, test, and security scan
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Toolchain diagnostics
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          Get-Command cmake | Select-Object Source,Version
      - name: Configure
        shell: pwsh
        run: tools/build.ps1 -ConfigureOnly -CpuOnlyValidation
      - name: Build
        shell: pwsh
        run: tools/build.ps1 -CpuOnlyValidation
      - name: Test
        shell: pwsh
        run: tools/test.ps1
      - name: Security scan
        shell: pwsh
        run: tools/security_scan.ps1
