name: release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: SemVer product version without v prefix; leave empty to use CMake project version
        required: false
        default: ""
        type: string
      replace_existing:
        description: Delete an existing release/tag with the same version before publishing
        required: false
        default: false
        type: boolean
      release_track:
        description: Release track; beta publishes a GitHub prerelease, stable publishes a normal release
        required: true
        default: beta
        type: choice
        options:
          - beta
          - stable
      create_msi:
        description: Build and install-test the MSI in addition to the portable ZIP
        required: false
        default: true
        type: boolean

# Top-level read access is enough for workflow dispatch metadata and checkout defaults.
permissions:
  contents: read # allow workflow dispatch metadata and checkout defaults

concurrency:
  group: release-${{ inputs.release_version || github.run_id }}
  cancel-in-progress: false

jobs:
  hosted-windows:
    name: Hosted Windows release validation
    runs-on: windows-2022
    timeout-minutes: 180
    # The release action creates tags/releases, so this job needs write access to repository contents.
    permissions:
      contents: write # allow the manual release job to create tags and GitHub releases
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run release pipeline
        uses: ./.github/actions/windows-release
        env:
          GH_TOKEN: ${{ github.token }}
          HIP_SDK_INSTALLER_URL: ${{ vars.HIP_SDK_INSTALLER_URL }}
          HIP_SDK_INSTALLER_SHA256: ${{ vars.HIP_SDK_INSTALLER_SHA256 }}
          WIX_OSMF_EULA_ID: ${{ vars.WIX_OSMF_EULA_ID }}
        with:
          release_version: ${{ inputs.release_version }}
          replace_existing: ${{ inputs.replace_existing }}
          release_track: ${{ inputs.release_track }}
          create_msi: ${{ inputs.create_msi }}
          enable_hip: "true"
          hip_arch: gfx1201
          allow_hip: "true"
