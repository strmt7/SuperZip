name: vulnetix-openvas

on:
  workflow_dispatch:
    inputs:
      artifact-path:
        description: Path containing OpenVAS or security reports to upload
        required: false
        default: reports

permissions:
  contents: read

jobs:
  vulnetix:
    runs-on: ubuntu-latest
    env:
      VULNETIX_ORG_ID: ${{ secrets.VULNETIX_ORG_ID }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check Vulnetix configuration
        if: ${{ env.VULNETIX_ORG_ID == '' }}
        run: |
          echo "VULNETIX_ORG_ID is not configured; skipping optional Vulnetix/OpenVAS upload lane."
      - name: Vulnetix health check
        if: ${{ env.VULNETIX_ORG_ID != '' }}
        uses: Vulnetix/cli@a6fb5f993c6404f1d2d2c36542fed67aa2a7738d # main as checked 2026-06-14
        with:
          org-id: ${{ secrets.VULNETIX_ORG_ID }}
      - name: Upload OpenVAS/security artifacts to Vulnetix
        if: ${{ env.VULNETIX_ORG_ID != '' }}
        uses: Vulnetix/cli@a6fb5f993c6404f1d2d2c36542fed67aa2a7738d # main as checked 2026-06-14
        with:
          org-id: ${{ secrets.VULNETIX_ORG_ID }}
          task: upload
          artifact-path: ${{ inputs.artifact-path }}
