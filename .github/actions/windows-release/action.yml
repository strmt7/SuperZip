name: Windows release pipeline
description: Build, test, package, smoke-test, and publish a SuperZip Windows x64 release.

inputs:
  release_version:
    description: SemVer product version without a v prefix; empty uses CMake project version.
    required: false
    default: ""
  replace_existing:
    description: Delete an existing release/tag before publishing.
    required: true
  replacement_acknowledgement:
    description: Required exact acknowledgement when replace_existing is true.
    required: true
  release_track:
    description: beta publishes a prerelease; stable publishes a normal release.
    required: true
  create_msi:
    description: Build and install-test the MSI.
    required: true
  enable_hip:
    description: Build with AMD HIP.
    required: true
  hip_arch:
    description: AMD HIP GPU architecture, for example gfx1201.
    required: true
  allow_hip:
    description: Whether this runner profile is allowed to produce HIP-enabled binaries.
    required: true

runs:
  using: composite
  steps:
    - name: Export release inputs
      shell: pwsh
      env:
        RELEASE_VERSION_INPUT: ${{ inputs.release_version }}
        REPLACE_EXISTING: ${{ inputs.replace_existing }}
        REPLACEMENT_ACKNOWLEDGEMENT: ${{ inputs.replacement_acknowledgement }}
        RELEASE_TRACK: ${{ inputs.release_track }}
        CREATE_MSI: ${{ inputs.create_msi }}
        ENABLE_HIP: ${{ inputs.enable_hip }}
        HIP_ARCH: ${{ inputs.hip_arch }}
        ALLOW_HIP: ${{ inputs.allow_hip }}
      run: |
        $ErrorActionPreference = "Stop"
        $values = [ordered]@{
            RELEASE_VERSION_INPUT = [string]$env:RELEASE_VERSION_INPUT
            REPLACE_EXISTING = [string]$env:REPLACE_EXISTING
            REPLACEMENT_ACKNOWLEDGEMENT = [string]$env:REPLACEMENT_ACKNOWLEDGEMENT
            RELEASE_TRACK = [string]$env:RELEASE_TRACK
            CREATE_MSI = [string]$env:CREATE_MSI
            ENABLE_HIP = [string]$env:ENABLE_HIP
            HIP_ARCH = [string]$env:HIP_ARCH
            ALLOW_HIP = [string]$env:ALLOW_HIP
        }
        foreach ($entry in $values.GetEnumerator()) {
            if ($entry.Value -match "[`r`n]") {
                throw "$($entry.Key) must be a single-line value."
            }
            Add-Content -LiteralPath $env:GITHUB_ENV -Value "$($entry.Key)=$($entry.Value)"
        }

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.14.4"

    - name: Resolve release metadata
      id: meta
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        New-Item -ItemType Directory -Force -Path out | Out-Null
        $existingTagsPath = "out\existing-release-tags.txt"
        $existingTags = @(
            gh api --paginate "repos/$env:GITHUB_REPOSITORY/tags" --jq ".[].name"
        )
        if ($LASTEXITCODE -ne 0) {
            throw "Unable to query existing release tags."
        }
        $existingTags |
            Where-Object { $_ } |
            Sort-Object -Unique |
            Set-Content -LiteralPath $existingTagsPath
        if (-not (Test-Path -LiteralPath $existingTagsPath)) {
            Set-Content -LiteralPath $existingTagsPath -Value ""
        }

        $requestedVersion = [string]$env:RELEASE_VERSION_INPUT
        $replaceExisting = $env:REPLACE_EXISTING -eq "true"
        if ($env:REPLACE_EXISTING -notin @("true", "false")) {
            throw "replace_existing must be true or false."
        }
        if ($replaceExisting -and -not $requestedVersion.Trim()) {
            throw "replace_existing requires an explicit release_version."
        }
        $replacementAcknowledgement = [string]$env:REPLACEMENT_ACKNOWLEDGEMENT
        if (-not $replaceExisting -and $replacementAcknowledgement.Trim()) {
            throw "replacement_acknowledgement is only valid when replace_existing=true."
        }
        if ($replaceExisting) {
            $expectedAcknowledgement = "replace $($requestedVersion.Trim())"
            if ($replacementAcknowledgement -ne $expectedAcknowledgement) {
                throw (
                    "replace_existing=true requires replacement_acknowledgement exactly " +
                    "'$expectedAcknowledgement'. Replacement is exceptional and must be " +
                    "explicitly requested by a maintainer/user.")
            }
        }
        if ($env:RELEASE_TRACK -notin @("beta", "stable")) {
            throw "release_track must be beta or stable."
        }
        if ($env:CREATE_MSI -notin @("true", "false")) {
            throw "create_msi must be true or false."
        }
        if ($replaceExisting -and $env:CREATE_MSI -eq "true") {
            throw (
                "replace_existing=true is refused for MSI releases. " +
                "MSI release replacement can leave Windows Installer with an already-installed same-version product; " +
                "publish a new SemVer numeric version, normally by increasing the patch digit.")
        }
        if ($env:ENABLE_HIP -notin @("true", "false")) {
            throw "enable_hip must be true or false."
        }
        if ($env:ALLOW_HIP -notin @("true", "false")) {
            throw "allow_hip must be true or false."
        }
        if ($env:HIP_ARCH -notmatch '^gfx[0-9a-z]+$') {
            throw "hip_arch must look like gfx1201."
        }
        if ($env:ENABLE_HIP -eq "true" -and $env:ALLOW_HIP -ne "true") {
            throw "enable_hip=true requires allow_hip=true for this runner profile."
        }
        if ($env:RELEASE_TRACK -eq "stable" -and $requestedVersion -match "-") {
            throw "stable releases must not use a prerelease SemVer suffix."
        }

        $metadataArgs = @(
            "tools/release_metadata.py",
            "--requested-version", $requestedVersion,
            "--existing-tags-file", $existingTagsPath,
            "--repo-root", "$PWD",
            "--json-output", "out/release-metadata.json"
        )
        if ($replaceExisting) {
            $metadataArgs += "--allow-existing"
        }
        python @metadataArgs
        $metadata = Get-Content -LiteralPath out\release-metadata.json -Raw | ConvertFrom-Json
        $releaseTag = [string]$metadata.release_tag

        $existingRelease = $false
        gh release view $releaseTag *> $null
        if ($LASTEXITCODE -eq 0) {
            $existingRelease = $true
        }
        $existingTag = $false
        $tagQuery = git ls-remote --tags origin "refs/tags/$releaseTag"
        if ($tagQuery) {
            $existingTag = $true
        }
        if (($existingRelease -or $existingTag) -and -not $replaceExisting) {
            throw "Release or tag $releaseTag already exists. Re-run with replace_existing=true to replace it."
        }
        if ($replaceExisting) {
            if ($existingRelease) {
                gh release delete $releaseTag --yes --cleanup-tag
            }
            $tagQuery = git ls-remote --tags origin "refs/tags/$releaseTag"
            if ($tagQuery) {
                gh api -X DELETE "repos/$env:GITHUB_REPOSITORY/git/refs/tags/$releaseTag"
            }
        }

    - name: Install AMD HIP SDK
      if: inputs.enable_hip == 'true'
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        if ($env:HIP_PATH -and (Test-Path -LiteralPath (Join-Path $env:HIP_PATH "bin\hipcc.exe"))) {
            Add-Content -LiteralPath $env:GITHUB_PATH -Value (Join-Path $env:HIP_PATH "bin")
            return
        }
        if (-not $env:HIP_SDK_INSTALLER_URL) {
            throw "HIP_SDK_INSTALLER_URL repository variable is required for HIP-enabled hosted release builds."
        }
        if (-not $env:HIP_SDK_INSTALLER_SHA256) {
            throw "HIP_SDK_INSTALLER_SHA256 repository variable is required for HIP-enabled hosted release builds."
        }
        if ($env:HIP_SDK_INSTALLER_URL -match "[`r`n]" -or $env:HIP_SDK_INSTALLER_SHA256 -match "[`r`n]") {
            throw "HIP SDK installer inputs must be single-line values."
        }
        if ($env:HIP_SDK_INSTALLER_SHA256 -notmatch '^[0-9A-Fa-f]{64}$') {
            throw "HIP_SDK_INSTALLER_SHA256 must be a 64-character SHA-256 digest."
        }
        $installer = Join-Path $env:RUNNER_TEMP "amd-hip-sdk-installer.exe"
        Invoke-WebRequest -Uri $env:HIP_SDK_INSTALLER_URL -OutFile $installer
        $actualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $installer).Hash.ToLowerInvariant()
        if ($actualHash -ne $env:HIP_SDK_INSTALLER_SHA256.ToLowerInvariant()) {
            throw "HIP SDK installer SHA-256 mismatch."
        }
        $installLog = Join-Path $env:RUNNER_TEMP "amd-hip-sdk-install.log"
        $hipInstallTimeoutSeconds = 20 * 60
        $process = Start-Process -FilePath $installer -ArgumentList @("-install", "-log", $installLog) -PassThru
        if (-not $process.WaitForExit($hipInstallTimeoutSeconds * 1000)) {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            $timeoutMessage = "AMD HIP SDK installer timed out after $hipInstallTimeoutSeconds seconds."
            $timeoutMessage += " Check whether an installer or elevation prompt was left unanswered."
            $timeoutMessage += " See $installLog."
            throw $timeoutMessage
        }
        $process.Refresh()
        if ($process.ExitCode -ne 0) {
            throw "AMD HIP SDK installer failed with exit code $($process.ExitCode). See $installLog."
        }
        $hipRoot = Get-ChildItem -LiteralPath "C:\Program Files\AMD\ROCm" -Directory -ErrorAction SilentlyContinue |
            Where-Object { Test-Path -LiteralPath (Join-Path $_.FullName "bin\hipcc.exe") } |
            Sort-Object Name -Descending |
            Select-Object -First 1
        if (-not $hipRoot) {
            throw "AMD HIP SDK installation completed but hipcc.exe was not found under C:\Program Files\AMD\ROCm."
        }
        Add-Content -LiteralPath $env:GITHUB_ENV -Value "HIP_PATH=$($hipRoot.FullName)"
        Add-Content -LiteralPath $env:GITHUB_PATH -Value (Join-Path $hipRoot.FullName "bin")

    - name: Toolchain diagnostics
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
          -latest `
          -products * `
          -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
          -property installationPath
        Get-Command cmake | Select-Object Source,Version
        Get-ComputerInfo | Select-Object CsSystemType,OSName,OSDisplayVersion
        if ($env:ENABLE_HIP -eq "true") {
            if (-not $env:HIP_PATH) {
                throw "HIP_PATH must be set before HIP release validation can run."
            }
            Get-Command hipcc -ErrorAction SilentlyContinue | Select-Object Source,Version
        }

    - name: Setup .NET for WiX
      if: inputs.create_msi == 'true'
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: "8.0.x"

    - name: Install WiX
      if: inputs.create_msi == 'true'
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        if ($env:WIX_OSMF_EULA_ID -ne "wix7") {
            throw "Set repository variable WIX_OSMF_EULA_ID to wix7 after accepting the WiX v7 OSMF EULA."
        }
        $toolPath = Join-Path $env:RUNNER_TEMP "wix"
        dotnet tool install --tool-path $toolPath wix --version 7.0.0
        Add-Content -LiteralPath $env:GITHUB_PATH -Value $toolPath
        & (Join-Path $toolPath "wix.exe") eula accept $env:WIX_OSMF_EULA_ID
        & (Join-Path $toolPath "wix.exe") --version
        & (Join-Path $toolPath "wix.exe") extension add --global WixToolset.UI.wixext/7.0.0

    - name: Build
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $buildArgs = @{
            Configuration = "Release"
            PackageVersion = $env:PACKAGE_VERSION
            MsiInstallScope = "perMachine"
        }
        if ($env:ENABLE_HIP -eq "true") {
            $buildArgs.EnableHip = $true
            $buildArgs.HipArch = $env:HIP_ARCH
        } else {
            $buildArgs.CpuOnlyValidation = $true
        }
        & tools/build.ps1 @buildArgs

    - name: Test
      shell: pwsh
      run: tools/test.ps1 -Configuration Release

    - name: Repository security scan
      shell: pwsh
      run: tools/security_scan.ps1

    - name: Package
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $packageArgs = @{
            Configuration = "Release"
            PackageVersion = $env:PACKAGE_VERSION
        }
        if ($env:ENABLE_HIP -ne "true") {
            $packageArgs.AllowCpuValidationPackage = $true
        }
        if ($env:CREATE_MSI -eq "true") {
            if ($env:WIX_OSMF_EULA_ID -ne "wix7") {
                throw "Set repository variable WIX_OSMF_EULA_ID to wix7 after accepting the WiX v7 OSMF EULA."
            }
            $env:SUPERZIP_ACCEPT_WIX_OSMF_EULA = $env:WIX_OSMF_EULA_ID
            $packageArgs.CreateMsi = $true
        }
        & tools/package.ps1 @packageArgs

    - name: Portable install smoke
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
        }
        $root = Join-Path $env:RUNNER_TEMP "superzip-portable-smoke"
        $input = Join-Path $root "input"
        $extract = Join-Path $root "extract"
        $cpioExtract = Join-Path $root "extract-cpio"
        $cpioGzipExtract = Join-Path $root "extract-cpio-gzip"
        New-Item -ItemType Directory -Force -Path $input, $extract, $cpioExtract, $cpioGzipExtract | Out-Null
        Set-Content -LiteralPath (Join-Path $input "alpha.txt") -Value "SuperZip release smoke $env:RELEASE_TAG"
        $cli = Join-Path $PWD "out\install-Release\bin\superzip_cli.exe"
        $dependency = & $cli dependency-check
        $dependencyExit = $LASTEXITCODE
        $dependency | Set-Content -LiteralPath (Join-Path $root "portable-dependency-check.txt")
        if ($env:ENABLE_HIP -eq "true") {
            if ($dependency -notcontains "hip_compiled=true") {
                throw "Portable release artifact is not HIP-enabled."
            }
            if ($dependency -notcontains "hip_runtime_loadable=true") {
                throw "Portable release artifact cannot load the AMD HIP runtime."
            }
            if ($dependencyExit -notin @(0, 12)) {
                throw "Portable dependency check failed with exit code $dependencyExit."
            }
        }
        & $cli compress --format zip --output (Join-Path $root "archive.zip") $input
        & $cli extract --format zip --output $extract (Join-Path $root "archive.zip")
        if ((Get-Content -LiteralPath (Join-Path $extract "input\alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable ZIP smoke extraction did not preserve payload."
        }
        $sevenZipArchive = Join-Path $root "archive.7z"
        [byte[]]$sevenZipBytes = @(
            0x37, 0x7A, 0xBC, 0xAF, 0x27, 0x1C, 0x00, 0x03, 0x3D, 0x43, 0x5A, 0x95,
            0x6E, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x20, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x53, 0x98, 0x07, 0xA4, 0x01, 0x00, 0x0F, 0x73,
            0x65, 0x76, 0x65, 0x6E, 0x7A, 0x69, 0x70, 0x20, 0x70, 0x61, 0x79, 0x6C,
            0x6F, 0x61, 0x64, 0x00, 0x00, 0x00, 0x81, 0x33, 0x07, 0xAE, 0x0F, 0xCF,
            0x39, 0xB0, 0x0C, 0x07, 0xC8, 0x43, 0x7F, 0x41, 0xB1, 0xFA, 0xFD, 0xE2,
            0xFB, 0x79, 0xDB, 0x20, 0x2B, 0xAD, 0x5E, 0x2C, 0x2A, 0x08, 0x11, 0x40,
            0xDD, 0xAF, 0x93, 0x26, 0x4C, 0x87, 0xDD, 0x72, 0x24, 0xFF, 0x4E, 0x59,
            0xEE, 0xE8, 0x34, 0x54, 0xB0, 0xAD, 0x39, 0x27, 0x50, 0xB2, 0xAD, 0x8D,
            0xB6, 0xC9, 0xF8, 0x8C, 0x2D, 0xE1, 0x19, 0x25, 0x71, 0xE0, 0xDE, 0x9B,
            0x28, 0xC7, 0x3A, 0xA1, 0x35, 0x2D, 0x26, 0x09, 0xCC, 0xCB, 0xC8, 0xE1,
            0xCC, 0x68, 0x28, 0x86, 0xDD, 0xFC, 0xEF, 0x33, 0xC0, 0x00, 0x17, 0x06,
            0x14, 0x01, 0x09, 0x5A, 0x00, 0x07, 0x0B, 0x01, 0x00, 0x01, 0x23, 0x03,
            0x01, 0x01, 0x05, 0x5D, 0x00, 0x00, 0x40, 0x00, 0x0C, 0x5E, 0x0A, 0x01,
            0xA7, 0x80, 0x03, 0x07, 0x00, 0x00
        )
        [IO.File]::WriteAllBytes($sevenZipArchive, $sevenZipBytes)
        $sevenZipIdentity = & $cli identify $sevenZipArchive
        if ($sevenZipIdentity -notmatch 'format=7z') {
            throw "Portable 7z smoke did not identify the 7z archive: $sevenZipIdentity"
        }
        $sevenZipExtract = Join-Path $root "extract-7z"
        New-Item -ItemType Directory -Force -Path $sevenZipExtract | Out-Null
        & $cli extract --format 7z --output $sevenZipExtract $sevenZipArchive
        if ((Get-Content -LiteralPath (Join-Path $sevenZipExtract "nested\payload.txt")) -ne "sevenzip payload") {
            throw "Portable 7z smoke extraction did not preserve payload."
        }
        $tarExtract = Join-Path $root "extract-tar"
        New-Item -ItemType Directory -Force -Path $tarExtract | Out-Null
        & $cli compress --format tar --output (Join-Path $root "archive.tar") $input
        & $cli extract --format tar --output $tarExtract (Join-Path $root "archive.tar")
        if ((Get-Content -LiteralPath (Join-Path $tarExtract "input\alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable TAR smoke extraction did not preserve payload."
        }
        $tarGzExtract = Join-Path $root "extract-tar-gz"
        New-Item -ItemType Directory -Force -Path $tarGzExtract | Out-Null
        & $cli compress --format tar.gz --output (Join-Path $root "archive.tar.gz") $input
        & $cli extract --format tar.gz --output $tarGzExtract (Join-Path $root "archive.tar.gz")
        if ((Get-Content -LiteralPath (Join-Path $tarGzExtract "input\alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable TAR.GZ smoke extraction did not preserve payload."
        }
        $tarBz2Extract = Join-Path $root "extract-tar-bz2"
        New-Item -ItemType Directory -Force -Path $tarBz2Extract | Out-Null
        & $cli compress --format tar.bz2 --output (Join-Path $root "archive.tar.bz2") $input
        & $cli extract --format tar.bz2 --output $tarBz2Extract (Join-Path $root "archive.tar.bz2")
        if ((Get-Content -LiteralPath (Join-Path $tarBz2Extract "input\alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable TAR.BZ2 smoke extraction did not preserve payload."
        }
        $tarZstdExtract = Join-Path $root "extract-tar-zst"
        New-Item -ItemType Directory -Force -Path $tarZstdExtract | Out-Null
        & $cli compress --format tar.zst --output (Join-Path $root "archive.tar.zst") $input
        $tarZstdIdentity = & $cli identify (Join-Path $root "archive.tar.zst")
        if ($tarZstdIdentity -notmatch 'format=tar.zst') {
            throw "Portable TAR.ZST smoke did not identify the .tar.zst archive: $tarZstdIdentity"
        }
        & $cli extract --format tar.zst --output $tarZstdExtract (Join-Path $root "archive.tar.zst")
        if ((Get-Content -LiteralPath (Join-Path $tarZstdExtract "input\alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable TAR.ZST smoke extraction did not preserve payload."
        }
        $gzipExtract = Join-Path $root "extract-gzip"
        New-Item -ItemType Directory -Force -Path $gzipExtract | Out-Null
        & $cli compress --format gz --output (Join-Path $root "alpha.txt.gz") (Join-Path $input "alpha.txt")
        & $cli extract --format gz --output $gzipExtract (Join-Path $root "alpha.txt.gz")
        if ((Get-Content -LiteralPath (Join-Path $gzipExtract "alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable Gzip smoke extraction did not preserve payload."
        }
        $bzip2Extract = Join-Path $root "extract-bzip2"
        New-Item -ItemType Directory -Force -Path $bzip2Extract | Out-Null
        & $cli compress --format bz2 --output (Join-Path $root "alpha.txt.bz2") (Join-Path $input "alpha.txt")
        $bzip2Identity = & $cli identify (Join-Path $root "alpha.txt.bz2")
        if ($bzip2Identity -notmatch 'format=bz2') {
            throw "Portable Bzip2 smoke did not identify the .bz2 stream: $bzip2Identity"
        }
        & $cli extract --format bz2 --output $bzip2Extract (Join-Path $root "alpha.txt.bz2")
        if ((Get-Content -LiteralPath (Join-Path $bzip2Extract "alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable Bzip2 smoke extraction did not preserve payload."
        }
        $zstdExtract = Join-Path $root "extract-zstd"
        New-Item -ItemType Directory -Force -Path $zstdExtract | Out-Null
        & $cli compress --format zst --output (Join-Path $root "alpha.txt.zst") (Join-Path $input "alpha.txt")
        $zstdIdentity = & $cli identify (Join-Path $root "alpha.txt.zst")
        if ($zstdIdentity -notmatch 'format=zst') {
            throw "Portable Zstandard smoke did not identify the .zst stream: $zstdIdentity"
        }
        & $cli extract --format zst --output $zstdExtract (Join-Path $root "alpha.txt.zst")
        if ((Get-Content -LiteralPath (Join-Path $zstdExtract "alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable Zstandard smoke extraction did not preserve payload."
        }
        $unixCompressExtract = Join-Path $root "extract-unix-compress"
        New-Item -ItemType Directory -Force -Path $unixCompressExtract | Out-Null
        & $cli compress --format z --output (Join-Path $root "alpha.txt.Z") (Join-Path $input "alpha.txt")
        $unixCompressIdentity = & $cli identify (Join-Path $root "alpha.txt.Z")
        if ($unixCompressIdentity -notmatch 'format=z') {
            throw "Portable Unix Compress smoke did not identify the .Z stream: $unixCompressIdentity"
        }
        & $cli extract --format z --output $unixCompressExtract (Join-Path $root "alpha.txt.Z")
        if ((Get-Content -LiteralPath (Join-Path $unixCompressExtract "alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable Unix Compress smoke extraction did not preserve payload."
        }
        & $cli compress --format cpio --output (Join-Path $root "archive.cpio") $input
        & $cli extract --format cpio --output $cpioExtract (Join-Path $root "archive.cpio")
        if ((Get-Content -LiteralPath (Join-Path $cpioExtract "input\alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable CPIO smoke extraction did not preserve payload."
        }
        & $cli compress --format cpio.gz --output (Join-Path $root "archive.cpgz") $input
        $cpioGzipIdentity = & $cli identify (Join-Path $root "archive.cpgz")
        if ($cpioGzipIdentity -notmatch 'format=cpio.gz') {
            throw "Portable CPIO.GZ smoke did not identify the .cpgz archive: $cpioGzipIdentity"
        }
        & $cli extract --format cpio.gz --output $cpioGzipExtract (Join-Path $root "archive.cpgz")
        if ((Get-Content -LiteralPath (Join-Path $cpioGzipExtract "input\alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable CPIO.GZ smoke extraction did not preserve payload."
        }
        $rpmExtract = Join-Path $root "extract-rpm"
        New-Item -ItemType Directory -Force -Path $rpmExtract | Out-Null
        $rpmArchive = Join-Path $root "package.rpm"
        & .\tools\new_rpm_smoke_fixture.ps1 -OutputPath $rpmArchive -PayloadPath (Join-Path $root "archive.cpio")
        $rpmIdentity = & $cli identify $rpmArchive
        if ($rpmIdentity -notmatch 'format=rpm') {
            throw "Portable RPM smoke did not identify the RPM package: $rpmIdentity"
        }
        & $cli extract --format rpm --output $rpmExtract $rpmArchive
        if ((Get-Content -LiteralPath (Join-Path $rpmExtract "input\alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable RPM smoke extraction did not preserve CPIO payload."
        }
        $cabExtract = Join-Path $root "extract-cab"
        New-Item -ItemType Directory -Force -Path $cabExtract | Out-Null
        $cabArchive = Join-Path $root "archive.cab"
        & .\tools\new_cab_smoke_fixture.ps1 `
          -OutputPath $cabArchive `
          -EntryName "input\alpha.txt" `
          -Payload "SuperZip release smoke $env:RELEASE_TAG"
        $cabIdentity = & $cli identify $cabArchive
        if ($cabIdentity -notmatch 'format=cab') {
            throw "Portable CAB smoke did not identify the CAB archive: $cabIdentity"
        }
        & $cli extract --format cab --output $cabExtract $cabArchive
        if ((Get-Content -LiteralPath (Join-Path $cabExtract "input\alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable CAB smoke extraction did not preserve payload."
        }
        $arExtract = Join-Path $root "extract-ar"
        New-Item -ItemType Directory -Force -Path $arExtract | Out-Null
        & $cli compress --format ar --output (Join-Path $root "archive.ar") $input
        & $cli extract --format ar --output $arExtract (Join-Path $root "archive.ar")
        if ((Get-Content -LiteralPath (Join-Path $arExtract "input\alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable AR smoke extraction did not preserve payload."
        }
        $debExtract = Join-Path $root "extract-deb"
        New-Item -ItemType Directory -Force -Path $debExtract | Out-Null
        & $cli compress --format ar --output (Join-Path $root "package.deb") $input
        $debIdentity = & $cli identify (Join-Path $root "package.deb")
        if ($debIdentity -notmatch 'format=deb') {
            throw "Portable DEB smoke did not identify the AR-based package as deb: $debIdentity"
        }
        & $cli extract --format deb --output $debExtract (Join-Path $root "package.deb")
        if ((Get-Content -LiteralPath (Join-Path $debExtract "input\alpha.txt")) -notlike "SuperZip release smoke*") {
            throw "Portable DEB smoke extraction did not preserve outer AR payload."
        }
        $isoExtract = Join-Path $root "extract-iso"
        New-Item -ItemType Directory -Force -Path $isoExtract | Out-Null
        $isoArchive = Join-Path $root "archive.iso"
        & .\tools\new_iso_smoke_fixture.ps1 -OutputPath $isoArchive -Payload "SuperZip release smoke $env:RELEASE_TAG"
        $isoIdentity = & $cli identify $isoArchive
        if ($isoIdentity -notmatch 'format=iso') {
            throw "Portable ISO smoke did not identify the .iso image: $isoIdentity"
        }
        & $cli extract --format iso --output $isoExtract $isoArchive
        if ((Get-Content -LiteralPath (Join-Path $isoExtract "ALPHA.TXT")) -notlike "SuperZip release smoke*") {
            throw "Portable ISO smoke extraction did not preserve payload."
        }
        $archive = Join-Path $root "archive.suzip"
        $suzipArgs = @("compress", "--format", "suzip", "--sha256", "--output", $archive, $input)
        if ($env:ENABLE_HIP -eq "true" -and $dependencyExit -eq 0) {
            $suzipArgs = @("compress", "--format", "suzip", "--require-gpu", "--sha256", "--output", $archive, $input)
        }
        & $cli @suzipArgs
        & $cli verify --sha256 $archive

    - name: MSI install smoke
      if: inputs.create_msi == 'true'
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
        }

        # Purpose: Print the end of a verbose Windows Installer log for actionable CI failures.
        # Inputs: Path is the log file to read; Label identifies the install phase in output.
        # Outputs: Writes a bounded log tail to stdout and returns no value.
        function Write-MsiLogTail {
            param(
                [Parameter(Mandatory = $true)]
                [string]$Path,
                [Parameter(Mandatory = $true)]
                [string]$Label
            )
            if (Test-Path -LiteralPath $Path) {
                Write-Host "----- $Label log tail -----"
                Get-Content -LiteralPath $Path -Tail 160
                Write-Host "----- end $Label log tail -----"
            } else {
                Write-Host "$Label log was not produced at $Path"
            }
        }

        # Purpose: Run msiexec with a short bounded wait and fail with the matching verbose log tail.
        # Inputs: Phase names the operation, Arguments are passed to msiexec.exe, LogPath is the verbose log location,
        # and TimeoutSeconds bounds stale installer/elevation waits.
        # Outputs: Returns no value when msiexec exits 0; throws with diagnostics on timeout or non-zero exit code.
        function Invoke-CheckedMsiExec {
            param(
                [Parameter(Mandatory = $true)]
                [string]$Phase,
                [Parameter(Mandatory = $true)]
                [string[]]$Arguments,
                [Parameter(Mandatory = $true)]
                [string]$LogPath,
                [int]$TimeoutSeconds = 300
            )
            $process = Start-Process -FilePath msiexec.exe -ArgumentList $Arguments -PassThru
            if (-not $process.WaitForExit($TimeoutSeconds * 1000)) {
                Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
                Write-MsiLogTail -Path $LogPath -Label $Phase
                throw "$Phase timed out after $TimeoutSeconds seconds. Check whether an installer or elevation prompt was left unanswered."
            }
            $process.Refresh()
            if ($process.ExitCode -ne 0) {
                Write-MsiLogTail -Path $LogPath -Label $Phase
                throw "$Phase failed with exit code $($process.ExitCode)."
            }
        }

        $msi = Join-Path $PWD "out\$env:PACKAGE_BASE.msi"
        $installLog = Join-Path $env:RUNNER_TEMP "superzip-msi-install.log"
        $repairLog = Join-Path $env:RUNNER_TEMP "superzip-msi-repair.log"
        $uninstallLog = Join-Path $env:RUNNER_TEMP "superzip-msi-uninstall.log"
        $expectedCli = Join-Path $env:ProgramFiles "SuperZip\bin\superzip_cli.exe"
        $installed = $false
        try {
            Invoke-CheckedMsiExec `
              -Phase "MSI install" `
              -Arguments @("/i", $msi, "/qn", "/norestart", "/L*v", $installLog) `
              -LogPath $installLog `
              -TimeoutSeconds 300
            $installed = $true
            if (-not (Test-Path -LiteralPath $expectedCli)) {
                throw "Installed CLI was not found at the release MSI Program Files path: $expectedCli"
            }
            $dependency = & $expectedCli dependency-check
            $dependencyExit = $LASTEXITCODE
            $dependency | Set-Content -LiteralPath (Join-Path $env:RUNNER_TEMP "superzip-msi-dependency-check.txt")
            if ($env:ENABLE_HIP -eq "true") {
                if ($dependency -notcontains "hip_compiled=true") {
                    throw "Installed release artifact is not HIP-enabled."
                }
                if ($dependency -notcontains "hip_runtime_loadable=true") {
                    throw "Installed release artifact cannot load the AMD HIP runtime."
                }
                if ($dependencyExit -notin @(0, 12)) {
                    throw "Installed dependency check failed with exit code $dependencyExit."
                }
            } elseif ($dependencyExit -ne 0) {
                throw "Installed dependency check failed with exit code $dependencyExit."
            }
            Invoke-CheckedMsiExec `
              -Phase "MSI repair" `
              -Arguments @("/fa", $msi, "/qn", "/norestart", "/L*v", $repairLog) `
              -LogPath $repairLog `
              -TimeoutSeconds 300
            if (-not (Test-Path -LiteralPath $expectedCli)) {
                throw "Installed CLI was not found after MSI repair at the release MSI Program Files path: $expectedCli"
            }
            $repairDependency = & $expectedCli dependency-check
            $repairDependencyExit = $LASTEXITCODE
            $repairDependency | Set-Content -LiteralPath (Join-Path $env:RUNNER_TEMP "superzip-msi-repair-dependency-check.txt")
            if ($env:ENABLE_HIP -eq "true") {
                if ($repairDependency -notcontains "hip_compiled=true") {
                    throw "Repaired release artifact is not HIP-enabled."
                }
                if ($repairDependency -notcontains "hip_runtime_loadable=true") {
                    throw "Repaired release artifact cannot load the AMD HIP runtime."
                }
                if ($repairDependencyExit -notin @(0, 12)) {
                    throw "Repaired dependency check failed with exit code $repairDependencyExit."
                }
            } elseif ($repairDependencyExit -ne 0) {
                throw "Repaired dependency check failed with exit code $repairDependencyExit."
            }
            $global:LASTEXITCODE = 0
        } finally {
            if ($installed) {
                Invoke-CheckedMsiExec `
                  -Phase "MSI uninstall" `
                  -Arguments @("/x", $msi, "/qn", "/norestart", "/L*v", $uninstallLog) `
                  -LogPath $uninstallLog `
                  -TimeoutSeconds 300
                if (Test-Path -LiteralPath $expectedCli) {
                    throw "Installed CLI remained after MSI uninstall at $expectedCli."
                }
                $global:LASTEXITCODE = 0
            }
        }

    - name: Generate release notes
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $notes = Join-Path $PWD "out\release-notes.md"
        $hipLine = if ($env:ENABLE_HIP -eq "true") {
            "- AMD HIP enabled: yes, architecture $env:HIP_ARCH. The HIP runtime is supplied by the installed AMD GPU driver."
        } else {
            "- AMD HIP enabled: no. This track is for internal validation only and must not be published as a product release."
        }
        @"
        Windows x64 release generated by the manual GitHub Actions release workflow.

        - 64-bit Windows package only.
        - Release track: $env:RELEASE_TRACK.
        $hipLine
        - Portable ZIP and compatibility-format smoke tests completed after staging install.
        - MSI built for per-machine installation under C:\Program Files\SuperZip.
        - Silent install/repair/uninstall smoke test completed with 5-minute timeouts per MSI phase.
        - Repository security scan completed before publishing.
        - SHA-256 checksum files are attached beside each package.
        "@ | Set-Content -LiteralPath $notes

    - name: Publish release
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $assets = @(
            "out\$env:PACKAGE_BASE-portable.zip",
            "out\$env:PACKAGE_BASE-portable.zip.sha256"
        )
        if ($env:CREATE_MSI -eq "true") {
            $assets += @(
                "out\$env:PACKAGE_BASE.msi",
                "out\$env:PACKAGE_BASE.msi.sha256"
            )
        }
        $createArgs = @(
            "release", "create", $env:RELEASE_TAG
        ) + $assets + @(
            "--target", $env:GITHUB_SHA,
            "--title", "SuperZip $env:RELEASE_TAG",
            "--notes-file", "out\release-notes.md",
            "--draft"
        )
        if ($env:RELEASE_TRACK -eq "beta") {
            $createArgs += "--prerelease"
        }
        gh @createArgs
        gh release view $env:RELEASE_TAG --json tagName,isDraft,isPrerelease,assets
        $editArgs = @("release", "edit", $env:RELEASE_TAG, "--draft=false")
        if ($env:RELEASE_TRACK -eq "beta") {
            $editArgs += "--prerelease"
        }
        gh @editArgs
        gh release view $env:RELEASE_TAG --json tagName,isDraft,isPrerelease,assets
