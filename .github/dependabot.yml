version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:10"
      timezone: UTC
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps(actions)
  - package-ecosystem: pip
    directory: /.github/requirements
    schedule:
      interval: weekly
      day: monday
      time: "04:20"
      timezone: UTC
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps(python)
